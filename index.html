// 效果显示名称
const mbEffectDisplay = {
  '1':'三层正弦波','2':'丝带飘动','3':'蝴蝶振翅','4':'花瓣展开','5':'气泡上升','6':'雨滴','7':'海浪涌动','8':'羽毛轻拮','9':'等高线',
  'N1':'瀑布流','N2':'蒲公英散','N3':'潮汐涨落','N4':'星座连线','N5':'涟漪水滴','N6':'弹力绳','N7':'沙漏','N8':'旋转星系','N9':'概率波纹','N10':'涵数螺旋',
  'N11':'蝴蝶曲线','N12':'毛线球','N13':'极光丝带','N14':'水墨晕染','N15':'万花尺','N16':'管道脉冲','N17':'蜂巢网格','N18':'电流脉冲','N19':'漱漪水纹','N20':'烟雾飘散',
  'N21':'星轨螺旋','N22':'光纤束','N23':'棕榈光谱',
  'N24':'矩阵雨','N25':'棕榈彩虹','N26':'弹珠跳跃','N27':'齿轮转动','N28':'旗帜飘扬'
};

function mbResize() {
  const dpr = window.devicePixelRatio || 1;
  mbW = window.innerWidth;
  musicBarBottom.width = mbW * dpr;
  musicBarBottom.height = mbH * dpr;
  mbCtx2.setTransform(dpr, 0, 0, dpr, 0, 0);
}
mbResize();
window.addEventListener('resize', mbResize);

// 模拟律动数据
function mbRhythm(t) {
  return 0.4 + 0.25 * Math.sin(t * 0.0028) + 0.15 * Math.sin(t * 0.006) + 0.1 * Math.sin(t * 0.011);
}

// 粒子池（复用，避免 GC）
let mbParticles = [];
let mbRipples = [];
let mbFireflies = null;
let mbTadpoles = null;
let mbVine = null;
let mbDandelions = null;
let mbConstellation = null;
let mbDropRipples = [];
let mbHourglassSand = [];
let mbGalaxyStars = null;
let mbYarnPoints = null;
let mbInkBlobs = [];
let mbSpirograph = null;
let mbSmokeParticles = [];
let mbStarTrails = null;
let mbMatrixRain = null;
let mbMarbles = null;
let mbGears = null;
function mbSpawnParticle(x, y, vx, vy, life, size) {
  mbParticles.push({ x, y, vx, vy, life, maxLife: life, size });
}
function mbUpdateParticles(w, h) {
  for (let i = mbParticles.length - 1; i >= 0; i--) {
    const p = mbParticles[i];
    p.x += p.vx; p.y += p.vy; p.life -= 1;
    if (p.life <= 0 || p.x < -10 || p.x > w + 10 || p.y < -10 || p.y > h + 10) {
      mbParticles.splice(i, 1);
    }
  }
}
function mbDrawParticles(color, boost) {
  boost = boost || 1;
  for (const p of mbParticles) {
    const a = Math.min(1, (p.life / p.maxLife) * boost);
    mbCtx.fillStyle = `rgba(${color},${a})`;
    mbCtx.beginPath();
    mbCtx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
    mbCtx.fill();
  }
}

function mbDraw() {
  if (!mbActive && !mbIdle) return;
  mbTime += 16;
  const w = mbW, h = mbH, t = mbTime;
  let r = mbActive ? mbRhythm(t) : (0.12 + 0.04 * Math.sin(t * 0.001));
  mbCtx.clearRect(0, 0, w, h);

  const idx = mbEffectNames[mbEffect];
  const cx = w / 2, cy = h / 2;

  // 颜色随主题
  const curTheme = document.documentElement.getAttribute('data-theme') || '';
  const isDark = curTheme === 'midnight' || curTheme === 'dream' || curTheme === 'starry' || curTheme === 'sunset' || curTheme === 'aurora';
  const baseColor = isDark ? '255,255,255' : '29,29,31';
  // 暗色主题亮度增益，让白色律动更明显
  if (isDark) r = Math.min(1, r * 1.8);

  // 辅助：画一条曲线
  function drawCurve(fn, alpha, lw) {
    mbCtx.strokeStyle = `rgba(${baseColor},${alpha * r})`;
    mbCtx.lineWidth = lw || 1.5;
    mbCtx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      const y = fn(x);
      if (x === 0) mbCtx.moveTo(x, y);
      else mbCtx.lineTo(x, y);
    }
    mbCtx.stroke();
  }

  try {
  switch (idx) {
    // ========== 保留的 6 种 ==========
    case '1': {
      // 三层正弦波
      drawCurve(x => cy + Math.sin((x + t*0.06)*0.018) * (h*0.38) * r, 0.55, 1.5);
      drawCurve(x => cy + Math.sin((x + t*0.04)*0.012 + Math.PI/3) * (h*0.28) * r, 0.35, 1.5);
      drawCurve(x => cy + Math.sin((x + t*0.08)*0.025 + Math.PI/2) * (h*0.18) * r, 0.25, 1.5);
      break;
    }
    case '2': {
      // 丝带飘动
      for (let i = 0; i < 5; i++) {
        const phase = i * 0.4;
        drawCurve(x => cy + Math.sin((x + t*0.05)*0.015 + phase) * (h*0.35) * r * (1 - i*0.12), 0.45 - i*0.07, 1.2);
      }
      break;
    }
    case '3': {
      // 蝴蝶振翅
      drawCurve(x => {
        const u = (x / w) * Math.PI * 4;
        const flap = Math.sin(t * 0.006);
        return cy + Math.sin(u) * Math.exp(-Math.abs(Math.sin(u))*0.5) * (h*0.4) * r * flap;
      }, 0.55, 1.5);
      drawCurve(x => {
        const u = (x / w) * Math.PI * 4;
        const flap = Math.sin(t * 0.006);
        return cy - Math.sin(u) * Math.exp(-Math.abs(Math.sin(u))*0.5) * (h*0.4) * r * flap;
      }, 0.35, 1.5);
      break;
    }
    case '4': {
      // 花瓣展开
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 + t * 0.001;
        drawCurve(x => {
          const u = (x / w) * Math.PI * 2;
          return cy + Math.sin(u * 2 + angle) * Math.cos(u + t*0.003) * (h*0.38) * r;
        }, 0.3, 1.2);
      }
      break;
    }
    case '5': {
      // 气泡上升
      if (mbTime % 120 < 16) {
        mbSpawnParticle(Math.random()*w, h, (Math.random()-0.5)*0.3, -0.4-Math.random()*0.6, 50+Math.random()*30, 1+Math.random()*1.5);
      }
      mbUpdateParticles(w, h);
      mbDrawParticles(baseColor, isDark ? 1.8 : 1);
      break;
    }
    case '6': {
      // 雨滴
      if (mbTime % 50 < 16) {
        for (let i = 0; i < 2; i++) {
          mbSpawnParticle(Math.random()*w, 0, 0, 1.5+Math.random()*1, 18+Math.random()*8, 0.6);
        }
      }
      mbUpdateParticles(w, h);
      mbDrawParticles(baseColor, isDark ? 1.8 : 1);
      break;
    }

    // ========== 新增 10 种 ==========
    case '7': {
      // 海浪涌动（曲线 + 填充）
      drawCurve(x => cy + Math.sin((x + t*0.05)*0.014) * (h*0.35) * r, 0.5, 1.5);
      // 下方填充
      mbCtx.beginPath();
      for (let x = 0; x <= w; x += 2) {
        const y = cy + Math.sin((x + t*0.05)*0.014) * (h*0.35) * r;
        if (x === 0) mbCtx.moveTo(x, y);
        else mbCtx.lineTo(x, y);
      }
      mbCtx.lineTo(w, h); mbCtx.lineTo(0, h); mbCtx.closePath();
      const grad = mbCtx.createLinearGradient(0, cy, 0, h);
      grad.addColorStop(0, `rgba(${baseColor},${0.15 * r})`);
      grad.addColorStop(1, `rgba(${baseColor},0)`);
      mbCtx.fillStyle = grad;
      mbCtx.fill();
      break;
    }
    case '8': {
      // 羽毛轻拂
      for (let i = 0; i < 4; i++) {
        const offset = i * 0.6;
        drawCurve(x => {
          const env = Math.exp(-Math.abs((x - cx) / (w * 0.3)) * 2);
          return cy + Math.sin((x + t*0.04)*0.03 + offset) * env * (h*0.4) * r;
        }, 0.4 - i*0.07, 1.2);
      }
      break;
    }
    case '9': {
      // 等高线
      for (let i = 0; i < 5; i++) {
        const amp = (i + 1) * 0.08;
        drawCurve(x => {
          const n = Math.sin(x*0.01 + t*0.005 + i*0.5) + Math.sin(x*0.03 + t*0.003 + i) * 0.5;
          return cy + n * (h * amp) * r;
        }, 0.3 - i*0.04, 1);
      }
      break;
    }

    // ========== 新增创意效果（第二个按钮） ==========
    case 'N1': {
      // 瀑布流（保留）
      const cols = 40;
      const cw = w / cols;
      for (let i = 0; i < cols; i++) {
        const flow = ((t * 0.003 + i * 0.17) % 1);
        const len = 8;
        for (let j = 0; j < len; j++) {
          const y = (flow * h + j * 3) % h;
          const alpha = (1 - j / len) * 0.4 * r;
          mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
          mbCtx.fillRect(i * cw, y, cw * 0.5, 2);
        }
      }
      break;
    }
    case 'N2': {
      // 蒲公英散（保留）
      if (!mbDandelions) {
        mbDandelions = [];
        for (let i = 0; i < 20; i++) {
          mbDandelions.push({ x: Math.random() * w, y: Math.random() * h, vx: 0.2 + Math.random() * 0.3, vy: -0.1 + Math.random() * 0.2, phase: Math.random() * Math.PI * 2, size: 1 + Math.random() });
        }
      }
      for (const d of mbDandelions) {
        d.x += d.vx + Math.sin(t * 0.002 + d.phase) * 0.3;
        d.y += d.vy + Math.cos(t * 0.003 + d.phase) * 0.15;
        if (d.x > w) d.x = 0;
        if (d.y < 0) d.y = h;
        if (d.y > h) d.y = 0;
        const alpha = 0.5 * r;
        mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
        mbCtx.beginPath();
        mbCtx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        mbCtx.fill();
        for (let k = 0; k < 5; k++) {
          const a = (k / 5) * Math.PI * 2 + t * 0.005;
          mbCtx.strokeStyle = `rgba(${baseColor},${alpha * 0.4})`;
          mbCtx.lineWidth = 0.4;
          mbCtx.beginPath();
          mbCtx.moveTo(d.x, d.y);
          mbCtx.lineTo(d.x + Math.cos(a) * d.size * 2.5, d.y + Math.sin(a) * d.size * 2.5);
          mbCtx.stroke();
        }
      }
      break;
    }
    case 'N3': {
      // 潮汐涨落（保留）
      const tideLevel = Math.sin(t * 0.001) * h * 0.2 + h * 0.5;
      drawCurve(x => {
        return tideLevel + Math.sin((x + t * 0.05) * 0.01) * (h * 0.08) * r;
      }, 0.5, 1.5);
      mbCtx.beginPath();
      for (let x = 0; x <= w; x += 2) {
        const y = tideLevel + Math.sin((x + t * 0.05) * 0.01) * (h * 0.08) * r;
        if (x === 0) mbCtx.moveTo(x, y);
        else mbCtx.lineTo(x, y);
      }
      mbCtx.lineTo(w, h); mbCtx.lineTo(0, h); mbCtx.closePath();
      const tideGrad = mbCtx.createLinearGradient(0, tideLevel, 0, h);
      tideGrad.addColorStop(0, `rgba(${baseColor},${0.12 * r})`);
      tideGrad.addColorStop(1, `rgba(${baseColor},0)`);
      mbCtx.fillStyle = tideGrad;
      mbCtx.fill();
      for (let i = 0; i < 15; i++) {
        const fx = ((i * 67.3 + t * 0.03) % w);
        const fy = tideLevel + Math.sin((fx + t * 0.05) * 0.01) * (h * 0.08) * r;
        mbCtx.fillStyle = `rgba(${baseColor},${0.3 * r})`;
        mbCtx.beginPath();
        mbCtx.arc(fx, fy, 0.8, 0, Math.PI * 2);
        mbCtx.fill();
      }
      break;
    }
    case 'N4': {
      // 星座连线
      if (!mbConstellation) {
        mbConstellation = [];
        for (let i = 0; i < 18; i++) {
          mbConstellation.push({ x: Math.random() * w, y: Math.random() * h, phase: Math.random() * Math.PI * 2 });
        }
      }
      for (let i = 0; i < mbConstellation.length; i++) {
        const s = mbConstellation[i];
        const twinkle = Math.sin(t * 0.005 + s.phase) * 0.5 + 0.5;
        mbCtx.fillStyle = `rgba(${baseColor},${twinkle * 0.6 * r})`;
        mbCtx.beginPath();
        mbCtx.arc(s.x, s.y, 1.2, 0, Math.PI * 2);
        mbCtx.fill();
        for (let j = i + 1; j < mbConstellation.length; j++) {
          const s2 = mbConstellation[j];
          const dx = s.x - s2.x, dy = s.y - s2.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < w * 0.12) {
            mbCtx.strokeStyle = `rgba(${baseColor},${(1 - dist / (w * 0.12)) * 0.15 * r})`;
            mbCtx.lineWidth = 0.4;
            mbCtx.beginPath();
            mbCtx.moveTo(s.x, s.y);
            mbCtx.lineTo(s2.x, s2.y);
            mbCtx.stroke();
          }
        }
      }
      break;
    }
    case 'N5': {
      // 涟漪水滴
      if (mbTime % 500 < 16) {
        mbDropRipples.push({ x: Math.random() * w, y: Math.random() * h, radius: 0, alpha: 0.6 });
      }
      for (let i = mbDropRipples.length - 1; i >= 0; i--) {
        const rp = mbDropRipples[i];
        rp.radius += 0.8;
        rp.alpha -= 0.008;
        if (rp.alpha <= 0) { mbDropRipples.splice(i, 1); continue; }
        mbCtx.strokeStyle = `rgba(${baseColor},${rp.alpha * r})`;
        mbCtx.lineWidth = 1;
        mbCtx.beginPath();
        mbCtx.arc(rp.x, rp.y, Math.max(1, rp.radius), 0, Math.PI * 2);
        mbCtx.stroke();
        if (rp.radius > 4) {
          mbCtx.strokeStyle = `rgba(${baseColor},${rp.alpha * 0.5 * r})`;
          mbCtx.beginPath();
          mbCtx.arc(rp.x, rp.y, Math.max(1, rp.radius - 4), 0, Math.PI * 2);
          mbCtx.stroke();
        }
      }
      break;
    }
    case 'N6': {
      // 弹力绳
      const numPoints = 30;
      const anchorY = h * 0.2;
      const dipY = h * 0.8;
      const bounce = Math.sin(t * 0.005) * 0.3 + 0.7;
      mbCtx.strokeStyle = `rgba(${baseColor},${0.5 * r})`;
      mbCtx.lineWidth = 1.5;
      mbCtx.beginPath();
      for (let i = 0; i <= numPoints; i++) {
        const x = (i / numPoints) * w;
        const wave = Math.sin((i / numPoints) * Math.PI);
        const y = anchorY + (dipY - anchorY) * wave * bounce * r + Math.sin(t * 0.01 + i * 0.3) * 1.5;
        if (i === 0) mbCtx.moveTo(x, y);
        else mbCtx.lineTo(x, y);
      }
      mbCtx.stroke();
      mbCtx.fillStyle = `rgba(${baseColor},${0.6 * r})`;
      mbCtx.beginPath();
      mbCtx.arc(0, anchorY, 2, 0, Math.PI * 2);
      mbCtx.arc(w, anchorY, 2, 0, Math.PI * 2);
      mbCtx.fill();
      break;
    }
    case 'N7': {
      // 沙漏
      const topY = h * 0.15, botY = h * 0.85;
      const gap = 3;
      const halfW = w * 0.06;
      mbCtx.strokeStyle = `rgba(${baseColor},${0.4 * r})`;
      mbCtx.lineWidth = 1;
      mbCtx.beginPath();
      mbCtx.moveTo(cx - halfW, topY);
      mbCtx.lineTo(cx + halfW, topY);
      mbCtx.moveTo(cx - halfW, topY);
      mbCtx.lineTo(cx - gap, botY);
      mbCtx.moveTo(cx + halfW, topY);
      mbCtx.lineTo(cx + gap, botY);
      mbCtx.moveTo(cx - gap, botY);
      mbCtx.lineTo(cx + gap, botY);
      mbCtx.stroke();
      if (mbTime % 30 < 16) {
        mbHourglassSand.push({ x: cx + (Math.random() - 0.5) * halfW * 0.6, y: topY + 2, vy: 0.3 + Math.random() * 0.2 });
      }
      for (let i = mbHourglassSand.length - 1; i >= 0; i--) {
        const sp = mbHourglassSand[i];
        sp.y += sp.vy;
        sp.vy += 0.01;
        const progress = (sp.y - topY) / (botY - topY);
        const limitW = halfW * (1 - progress * 0.8);
        if (sp.x > cx + limitW) sp.x = cx + limitW;
        if (sp.x < cx - limitW) sp.x = cx - limitW;
        if (sp.y >= botY - 1) { mbHourglassSand.splice(i, 1); continue; }
        mbCtx.fillStyle = `rgba(${baseColor},${0.5 * r})`;
        mbCtx.fillRect(sp.x, sp.y, 1, 1.5);
      }
      break;
    }
    case 'N8': {
      // 旋转星系
      if (!mbGalaxyStars) {
        mbGalaxyStars = [];
        for (let i = 0; i < 60; i++) {
          mbGalaxyStars.push({ angle: Math.random() * Math.PI * 2, dist: Math.random(), speed: 0.001 + Math.random() * 0.003, size: 0.5 + Math.random() });
        }
      }
      for (const gs of mbGalaxyStars) {
        gs.angle += gs.speed;
        const armOffset = Math.sin(gs.dist * Math.PI * 4) * 0.5;
        const radius = gs.dist * w * 0.25;
        const px = cx + Math.cos(gs.angle + armOffset) * radius;
        const py = cy + Math.sin(gs.angle + armOffset) * radius * 0.35;
        const alpha = (1 - gs.dist * 0.5) * 0.5 * r;
        mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
        mbCtx.beginPath();
        mbCtx.arc(px, py, gs.size, 0, Math.PI * 2);
        mbCtx.fill();
      }
      break;
    }
    case 'N9': {
      // 概率波纹
      const numWaves = 6;
      for (let i = 0; i < numWaves; i++) {
        const speed = 0.002 + i * 0.0008;
        const freq = 0.008 + i * 0.003;
        const amp = (h * 0.15) * (1 - i * 0.1);
        drawCurve(x => {
          return cy + Math.sin(x * freq + t * speed + i * 0.5) * amp * r;
        }, 0.3 - i * 0.03, 1 - i * 0.08);
      }
      break;
    }
    case 'N10': {
      // 涵数螺旋
      const maxTheta = (t * 0.01) % (Math.PI * 8);
      mbCtx.strokeStyle = `rgba(${baseColor},${0.5 * r})`;
      mbCtx.lineWidth = 1.2;
      mbCtx.beginPath();
      for (let i = 0; i <= 200; i++) {
        const theta = (i / 200) * maxTheta;
        const radius = Math.max(1, theta * 0.8);
        const px = cx + Math.cos(theta) * radius;
        const py = cy + Math.sin(theta) * radius * 0.35;
        if (i === 0) mbCtx.moveTo(px, py);
        else mbCtx.lineTo(px, py);
      }
      mbCtx.stroke();
      break;
    }
    case 'N11': {
      // 蝴蝶曲线
      mbCtx.strokeStyle = `rgba(${baseColor},${0.5 * r})`;
      mbCtx.lineWidth = 1.2;
      mbCtx.beginPath();
      const scale = h * 0.06 * r;
      for (let i = 0; i <= 300; i++) {
        const u = (i / 300) * Math.PI * 12;
        const factor = Math.exp(Math.cos(u)) - 2 * Math.cos(4 * u) - Math.pow(Math.sin(u / 12), 5);
        const px = cx + Math.sin(u) * factor * scale;
        const py = cy - Math.cos(u) * factor * scale * 0.5;
        if (i === 0) mbCtx.moveTo(px, py);
        else mbCtx.lineTo(px, py);
      }
      mbCtx.stroke();
      break;
    }
    case 'N12': {
      // 毛线球
      if (!mbYarnPoints) {
        mbYarnPoints = [];
        for (let i = 0; i < 40; i++) {
          mbYarnPoints.push({ angle: Math.random() * Math.PI * 2, dist: Math.random() * 0.4 + 0.6, speed: (Math.random() - 0.5) * 0.004 });
        }
      }
      mbCtx.strokeStyle = `rgba(${baseColor},${0.3 * r})`;
      mbCtx.lineWidth = 0.6;
      mbCtx.beginPath();
      for (let i = 0; i < mbYarnPoints.length; i++) {
        const p1 = mbYarnPoints[i];
        p1.angle += p1.speed;
        const x1 = cx + Math.cos(p1.angle) * w * p1.dist * 0.12;
        const y1 = cy + Math.sin(p1.angle) * h * p1.dist * 0.4;
        if (i === 0) mbCtx.moveTo(x1, y1);
        else mbCtx.lineTo(x1, y1);
      }
      mbCtx.closePath();
      mbCtx.stroke();
      mbCtx.beginPath();
      for (let i = 0; i < mbYarnPoints.length; i++) {
        const p = mbYarnPoints[i];
        const x = cx + Math.cos(p.angle + Math.PI) * w * p.dist * 0.1;
        const y = cy + Math.sin(p.angle + Math.PI) * h * p.dist * 0.35;
        if (i === 0) mbCtx.moveTo(x, y);
        else mbCtx.lineTo(x, y);
      }
      mbCtx.closePath();
      mbCtx.stroke();
      break;
    }
    case 'N13': {
      // 极光丝带
      for (let i = 0; i < 4; i++) {
        const layerR = 0.15 + i * 0.05;
        drawCurve(x => {
          const baseY = cy + (i - 1.5) * h * 0.08;
          const wave1 = Math.sin(x * 0.008 + t * 0.003 + i) * h * layerR;
          const wave2 = Math.sin(x * 0.02 + t * 0.005 + i * 2) * h * 0.04;
          return baseY + (wave1 + wave2) * r;
        }, 0.35 - i * 0.05, 2 - i * 0.3);
      }
      break;
    }
    case 'N14': {
      // 水墨晕染
      if (mbTime % 600 < 16) {
        mbInkBlobs.push({ x: Math.random() * w, y: Math.random() * h, radius: 0, maxRadius: 15 + Math.random() * 20, alpha: 0.4 });
      }
      for (let i = mbInkBlobs.length - 1; i >= 0; i--) {
        const blob = mbInkBlobs[i];
        blob.radius += 0.15;
        blob.alpha -= 0.004;
        if (blob.alpha <= 0) { mbInkBlobs.splice(i, 1); continue; }
        const grad = mbCtx.createRadialGradient(blob.x, blob.y, 0, blob.x, blob.y, Math.max(1, blob.radius));
        grad.addColorStop(0, `rgba(${baseColor},${blob.alpha * r})`);
        grad.addColorStop(0.7, `rgba(${baseColor},${blob.alpha * 0.3 * r})`);
        grad.addColorStop(1, `rgba(${baseColor},0)`);
        mbCtx.fillStyle = grad;
        mbCtx.beginPath();
        mbCtx.arc(blob.x, blob.y, Math.max(1, blob.radius), 0, Math.PI * 2);
        mbCtx.fill();
      }
      break;
    }
    case 'N15': {
      // 万花尺
      if (!mbSpirograph) {
        mbSpirograph = { R: 20, r: 8, d: 15, phase: 0 };
      }
      mbSpirograph.phase += 0.01;
      const sp = mbSpirograph;
      const scale = r * 0.8;
      mbCtx.strokeStyle = `rgba(${baseColor},${0.5 * r})`;
      mbCtx.lineWidth = 1;
      mbCtx.beginPath();
      for (let i = 0; i <= 500; i++) {
        const theta = (i / 500) * Math.PI * 6 + sp.phase;
        const px = cx + ((sp.R - sp.r) * Math.cos(theta) + sp.d * Math.cos((sp.R - sp.r) / sp.r * theta)) * scale;
        const py = cy + ((sp.R - sp.r) * Math.sin(theta) - sp.d * Math.sin((sp.R - sp.r) / sp.r * theta)) * scale * 0.35;
        if (i === 0) mbCtx.moveTo(px, py);
        else mbCtx.lineTo(px, py);
      }
      mbCtx.stroke();
      break;
    }
    case 'N16': {
      // 管道脉冲
      const numPipes = 3;
      for (let p = 0; p < numPipes; p++) {
        const pipeY = (p + 0.5) / numPipes * h;
        mbCtx.strokeStyle = `rgba(${baseColor},${0.15 * r})`;
        mbCtx.lineWidth = 3;
        mbCtx.beginPath();
        mbCtx.moveTo(0, pipeY);
        mbCtx.lineTo(w, pipeY);
        mbCtx.stroke();
        const pulseX = ((t * 0.1 + p * 80) % (w + 40)) - 20;
        const grad = mbCtx.createLinearGradient(pulseX - 20, pipeY, pulseX + 20, pipeY);
        grad.addColorStop(0, `rgba(${baseColor},0)`);
        grad.addColorStop(0.5, `rgba(${baseColor},${0.6 * r})`);
        grad.addColorStop(1, `rgba(${baseColor},0)`);
        mbCtx.strokeStyle = grad;
        mbCtx.lineWidth = 3;
        mbCtx.beginPath();
        mbCtx.moveTo(Math.max(0, pulseX - 20), pipeY);
        mbCtx.lineTo(Math.min(w, pulseX + 20), pipeY);
        mbCtx.stroke();
      }
      break;
    }
    case 'N17': {
      // 蜂巢网格
      const cellSize = 12;
      const cols2 = Math.ceil(w / cellSize);
      const rows2 = Math.ceil(h / cellSize);
      for (let row = 0; row < rows2; row++) {
        for (let col = 0; col < cols2; col++) {
          const hx = col * cellSize + cellSize / 2;
          const hy = row * cellSize + cellSize / 2;
          const ddx = hx - cx, ddy = hy - cy;
          const dist = Math.sqrt(ddx * ddx + ddy * ddy);
          const pulse = Math.sin(dist * 0.05 - t * 0.005) * 0.5 + 0.5;
          const alpha = pulse * 0.4 * r;
          if (alpha > 0.02) {
            mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
            mbCtx.beginPath();
            mbCtx.arc(hx, hy, 1.5, 0, Math.PI * 2);
            mbCtx.fill();
          }
        }
      }
      break;
    }
    case 'N18': {
      // 电流脉冲
      const wireY = cy;
      mbCtx.strokeStyle = `rgba(${baseColor},${0.15 * r})`;
      mbCtx.lineWidth = 1;
      mbCtx.beginPath();
      mbCtx.moveTo(0, wireY);
      mbCtx.lineTo(w, wireY);
      mbCtx.stroke();
      const pulsePos = (t * 0.08) % (w + 60) - 30;
      for (let i = 0; i < 30; i++) {
        const px = pulsePos - i * 2;
        if (px >= 0 && px <= w) {
          const alpha = (1 - i / 30) * 0.5 * r;
          mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
          mbCtx.beginPath();
          mbCtx.arc(px, wireY, 1.5 + (1 - i / 30) * 1, 0, Math.PI * 2);
          mbCtx.fill();
        }
      }
      mbCtx.strokeStyle = `rgba(${baseColor},${0.4 * r})`;
      mbCtx.lineWidth = 1;
      mbCtx.beginPath();
      for (let x = 0; x <= w; x += 2) {
        const distFromPulse = Math.abs(x - pulsePos);
        const waveAmp = Math.exp(-distFromPulse * 0.05) * 6 * r;
        const y = wireY + Math.sin(x * 0.1 + t * 0.02) * waveAmp;
        if (x === 0) mbCtx.moveTo(x, y);
        else mbCtx.lineTo(x, y);
      }
      mbCtx.stroke();
      break;
    }
    case 'N19': {
      // 漱漪水纹
      for (let ring = 0; ring < 5; ring++) {
        const baseRadius = ((t * 0.02 + ring * 15) % 60) + 5;
        const alpha = (1 - baseRadius / 60) * 0.4 * r;
        mbCtx.strokeStyle = `rgba(${baseColor},${alpha})`;
        mbCtx.lineWidth = 1;
        mbCtx.beginPath();
        for (let a = 0; a <= Math.PI * 2 + 0.1; a += 0.1) {
          const wobble = Math.sin(a * 6 + t * 0.005) * 2;
          const rad = Math.max(1, baseRadius + wobble);
          const px = cx + Math.cos(a) * rad;
          const py = cy + Math.sin(a) * rad * 0.35;
          if (a === 0) mbCtx.moveTo(px, py);
          else mbCtx.lineTo(px, py);
        }
        mbCtx.closePath();
        mbCtx.stroke();
      }
      break;
    }
    case 'N20': {
      // 烟雾飘散
      if (mbTime % 100 < 16) {
        mbSmokeParticles.push({
          x: cx + (Math.random() - 0.5) * 30,
          y: h,
          vx: (Math.random() - 0.5) * 0.2,
          vy: -0.2 - Math.random() * 0.3,
          life: 80,
          maxLife: 80,
          size: 3 + Math.random() * 3
        });
      }
      for (let i = mbSmokeParticles.length - 1; i >= 0; i--) {
        const sp = mbSmokeParticles[i];
        sp.x += sp.vx + Math.sin(t * 0.003 + sp.y * 0.05) * 0.2;
        sp.y += sp.vy;
        sp.life -= 1;
        if (sp.life <= 0) { mbSmokeParticles.splice(i, 1); continue; }
        const a = sp.life / sp.maxLife;
        const sz = Math.max(1, sp.size * 2 * a);
        const grad = mbCtx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, sz);
        grad.addColorStop(0, `rgba(${baseColor},${a * 0.25 * r})`);
        grad.addColorStop(1, `rgba(${baseColor},0)`);
        mbCtx.fillStyle = grad;
        mbCtx.beginPath();
        mbCtx.arc(sp.x, sp.y, sz, 0, Math.PI * 2);
        mbCtx.fill();
      }
      break;
    }
    case 'N21': {
      // 星轨螺旋
      if (!mbStarTrails) {
        mbStarTrails = [];
        for (let i = 0; i < 15; i++) {
          mbStarTrails.push({ angle: (i / 15) * Math.PI * 2, dist: 0.2 + (i % 3) * 0.15, trail: [] });
        }
      }
      for (const st of mbStarTrails) {
        st.angle += 0.003;
        const radius = st.dist * w * 0.2;
        const px = cx + Math.cos(st.angle) * radius;
        const py = cy + Math.sin(st.angle) * radius * 0.35;
        st.trail.push({ x: px, y: py });
        if (st.trail.length > 20) st.trail.shift();
        for (let i = 0; i < st.trail.length; i++) {
          const tp = st.trail[i];
          const alpha = (i / st.trail.length) * 0.5 * r;
          mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
          mbCtx.beginPath();
          mbCtx.arc(tp.x, tp.y, 0.6, 0, Math.PI * 2);
          mbCtx.fill();
        }
      }
      break;
    }
    case 'N22': {
      // 光纤束
      const numFibers = 12;
      for (let i = 0; i < numFibers; i++) {
        const baseY = (i / numFibers) * h;
        const phase = i * 0.4;
        mbCtx.strokeStyle = `rgba(${baseColor},${0.3 * r})`;
        mbCtx.lineWidth = 0.8;
        mbCtx.beginPath();
        for (let x = 0; x <= w; x += 3) {
          const wave = Math.sin(x * 0.01 + t * 0.003 + phase) * 3 * r;
          const y = baseY + wave;
          if (x === 0) mbCtx.moveTo(x, y);
          else mbCtx.lineTo(x, y);
        }
        mbCtx.stroke();
        const pulseX = ((t * 0.05 + i * 20) % w);
        const py = baseY + Math.sin(pulseX * 0.01 + t * 0.003 + phase) * 3 * r;
        mbCtx.fillStyle = `rgba(${baseColor},${0.6 * r})`;
        mbCtx.beginPath();
        mbCtx.arc(pulseX, py, 1.5, 0, Math.PI * 2);
        mbCtx.fill();
      }
      break;
    }
    case 'N23': {
      // 棕榈光谱
      const numBars = 40;
      const barW = w / numBars;
      for (let i = 0; i < numBars; i++) {
        const phase = Math.sin(t * 0.003 + i * 0.15) * 0.5 + 0.5;
        const noise = Math.sin(t * 0.01 + i * 1.7) * 0.2;
        const bh = (phase + noise) * h * 0.45 * r;
        const alpha = 0.2 + phase * 0.3;
        mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
        mbCtx.fillRect(i * barW, cy - bh, barW - 0.5, bh * 2);
      }
      break;
    }
    case 'N24': {
      // 矩阵雨
      if (!mbMatrixRain) {
        mbMatrixRain = [];
        for (let i = 0; i < 30; i++) {
          mbMatrixRain.push({ x: (i / 30) * w, y: Math.random() * h, speed: 0.3 + Math.random() * 0.5, chars: [] });
        }
      }
      for (const col of mbMatrixRain) {
        col.y += col.speed * r * 2;
        if (col.y > h + 10) col.y = -10;
        const headAlpha = 0.6 * r;
        mbCtx.fillStyle = `rgba(${baseColor},${headAlpha})`;
        mbCtx.fillRect(col.x, col.y, 2, 4);
        for (let j = 1; j < 6; j++) {
          const ty = col.y - j * 4;
          if (ty >= 0) {
            const a = (1 - j / 6) * 0.3 * r;
            mbCtx.fillStyle = `rgba(${baseColor},${a})`;
            mbCtx.fillRect(col.x, ty, 1.5, 3);
          }
        }
      }
      break;
    }
    case 'N25': {
      // 棕榈彩虹
      const numBands = 28;
      const bandW = w / numBands;
      for (let i = 0; i < numBands; i++) {
        const phase = Math.sin(t * 0.004 + i * 0.2) * 0.5 + 0.5;
        const bh = phase * h * 0.4 * r;
        const hue = (i / numBands) * 360;
        const alpha = 0.2 + phase * 0.3;
        mbCtx.fillStyle = `hsla(${hue}, 70%, 55%, ${alpha})`;
        mbCtx.fillRect(i * bandW, cy - bh, bandW - 0.5, bh * 2);
      }
      break;
    }
    case 'N26': {
      // 弹珠跳跃
      if (!mbMarbles) {
        mbMarbles = [];
        for (let i = 0; i < 6; i++) {
          mbMarbles.push({ x: (i + 0.5) / 6 * w, y: h * 0.3, vy: 0, phase: i * 0.5 });
        }
      }
      for (const m of mbMarbles) {
        m.vy += 0.015;
        m.y += m.vy * r * 2;
        if (m.y > h * 0.85) {
          m.y = h * 0.85;
          m.vy = -Math.abs(m.vy) * 0.85;
        }
        const alpha = 0.5 * r;
        mbCtx.fillStyle = `rgba(${baseColor},${alpha})`;
        mbCtx.beginPath();
        mbCtx.arc(m.x, m.y, 2, 0, Math.PI * 2);
        mbCtx.fill();
        // trail
        mbCtx.strokeStyle = `rgba(${baseColor},${alpha * 0.3})`;
        mbCtx.lineWidth = 0.5;
        mbCtx.beginPath();
        mbCtx.moveTo(m.x, m.y);
        mbCtx.lineTo(m.x, h * 0.85);
        mbCtx.stroke();
      }
      // floor line
      mbCtx.strokeStyle = `rgba(${baseColor},${0.2 * r})`;
      mbCtx.lineWidth = 0.8;
      mbCtx.beginPath();
      mbCtx.moveTo(0, h * 0.85);
      mbCtx.lineTo(w, h * 0.85);
      mbCtx.stroke();
      break;
    }
    case 'N27': {
      // 齿轮转动
      const spin = t * 0.003;
      const teeth = 12;
      const gearR = h * 0.35;
      for (let g = 0; g < 2; g++) {
        const gx = g === 0 ? cx - w * 0.08 : cx + w * 0.08;
        const gy = cy;
        const gSpin = g === 0 ? spin : -spin * 1.5;
        mbCtx.strokeStyle = `rgba(${baseColor},${0.4 * r})`;
        mbCtx.lineWidth = 1.2;
        mbCtx.beginPath();
        for (let i = 0; i <= teeth * 2; i++) {
          const a = (i / (teeth * 2)) * Math.PI * 2 + gSpin;
          const isOuter = i % 2 === 0;
          const rad = isOuter ? gearR : gearR * 0.75;
          const px = gx + Math.cos(a) * rad;
          const py = gy + Math.sin(a) * rad * 0.4;
          if (i === 0) mbCtx.moveTo(px, py);
          else mbCtx.lineTo(px, py);
        }
        mbCtx.closePath();
        mbCtx.stroke();
        // center
        mbCtx.fillStyle = `rgba(${baseColor},${0.3 * r})`;
        mbCtx.beginPath();
        mbCtx.arc(gx, gy, 3, 0, Math.PI * 2);
        mbCtx.fill();
      }
      break;
    }
    case 'N28': {
      // 旗帜飘扬
      const numWaves = 5;
      for (let i = 0; i < numWaves; i++) {
        const yBase = (i / numWaves) * h + h * 0.1;
        const amp = h * 0.08 * (1 - i * 0.1);
        drawCurve(x => {
          const wave = Math.sin(x * 0.015 + t * 0.004 + i * 0.8) * amp * r;
          const envelope = Math.min(1, x / (w * 0.15));
          return yBase + wave * envelope;
        }, 0.35 - i * 0.04, 1.2 - i * 0.1);
      }
      // flag pole
      mbCtx.strokeStyle = `rgba(${baseColor},${0.4 * r})`;
      mbCtx.lineWidth = 1.5;
      mbCtx.beginPath();
      mbCtx.moveTo(1, 0);
      mbCtx.lineTo(1, h);
      mbCtx.stroke();
      break;
    }
  }
  } catch(e) {}

  mbRAF = requestAnimationFrame(mbDraw);
}

function mbStart() {
  mbActive = true;
  mbIdle = false;
  const isMinimal = document.body.classList.contains('layout-minimal');
  if (isMinimal) {
    musicBarBottom.classList.remove('idle');
    musicBarBottom.classList.add('active');
  } else {
    musicBarBottom.classList.remove('active', 'idle');
  }
  mbResize();
  if (!mbRAF) mbDraw();
  mbUpdateTitles();
  mbResetAutoHide();
}

function mbStop() {
  mbActive = false;
  const isMinimal = document.body.classList.contains('layout-minimal');
  if (isMinimal) {
    mbIdle = true;
    musicBarBottom.classList.remove('active');
    musicBarBottom.classList.add('idle');
    mbParticles = [];
    if (!mbRAF) mbDraw();
    mbResetAutoHide();
  } else {
    mbIdle = false;
    musicBarBottom.classList.remove('active', 'idle');
    if (mbRAF) { cancelAnimationFrame(mbRAF); mbRAF = null; }
    mbCtx2.setTransform(1, 0, 0, 1, 0, 0);
    mbCtx2.clearRect(0, 0, musicBarBottom.width, musicBarBottom.height);
    const dpr3 = window.devicePixelRatio || 1;
    mbCtx2.setTransform(dpr3, 0, 0, dpr3, 0, 0);
  }
}

function mbUpdateTitles() {
  const id1 = mbEffectNames[mbEffect];
  const name1 = mbEffectDisplay[id1] || id1;
  musicFxBtn.title = `${mbEffect + 1}. ${name1}`;
}

// 切换效果
musicFxBtn.addEventListener('click', (e) => {
  mbEffect = (mbEffect + 1) % mbEffectNames.length;
  mbParticles = [];
  mbUpdateTitles();
  mbResetAutoHide();
  e.currentTarget.blur();
});

// 关闭按钮：停止律动动画
let mbClosed = false;
musicFxClose.addEventListener('click', (e) => {
  mbClosed = true;
  mbActive = false;
  mbIdle = false;
  musicBarBottom.classList.remove('active', 'idle');
  if (mbHideTimer) clearTimeout(mbHideTimer);
  musicFxBtn.classList.add('auto-hidden');
  musicFxClose.classList.add('auto-hidden');
  if (mbRAF) { cancelAnimationFrame(mbRAF); mbRAF = null; }
  mbCtx2.setTransform(1, 0, 0, 1, 0, 0);
  mbCtx2.clearRect(0, 0, musicBarBottom.width, musicBarBottom.height);
  const dpr4 = window.devicePixelRatio || 1;
  mbCtx2.setTransform(dpr4, 0, 0, dpr4, 0, 0);
  e.currentTarget.blur();
});

// 5秒无操作自动隐藏切换按钮
let mbHideTimer = null;
function mbResetAutoHide() {
  musicFxBtn.classList.remove('auto-hidden');
  musicFxClose.classList.remove('auto-hidden');
  if (mbHideTimer) clearTimeout(mbHideTimer);
  mbHideTimer = setTimeout(() => {
    musicFxBtn.classList.add('auto-hidden');
    musicFxClose.classList.add('auto-hidden');
  }, 5000);
}

const musicBarContainer = document.querySelector('.music-bar-bottom-container');
if (musicBarContainer) {
  musicBarContainer.addEventListener('mouseenter', () => {
    if ((mbActive || mbIdle) && !mbClosed) {
      mbResetAutoHide();
    }
  });
  musicBarContainer.addEventListener('mouseleave', () => {
    if ((mbActive || mbIdle) && !mbClosed) {
      mbHideTimer = setTimeout(() => {
        musicFxBtn.classList.add('auto-hidden');
        musicFxClose.classList.add('auto-hidden');
      }, 5000);
    }
  });
}

// 监听播放状态：观察 musicPlay 按钮的 playing class
const mbObserver = new MutationObserver(() => {
  if (musicPlay.classList.contains('playing')) {
    mbStart();
  } else {
    mbStop();
  }
});
mbObserver.observe(musicPlay, { attributes: true, attributeFilter: ['class'] });

</script>
